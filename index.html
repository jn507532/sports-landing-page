<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 mt-2">Sign up to get started</p>
        </div>

        <form id="signupForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Your name"
                    class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required
                    minlength="2"
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required
                    minlength="6"
                />
                <p class="text-xs text-gray-500 mt-2">At least 6 characters</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="••••••••"
                    class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required
                    minlength="6"
                />
            </div>

            <div class="flex items-start gap-3">
                <input id="terms" type="checkbox" class="mt-1 rounded text-blue-600" />
                <label for="terms" class="text-sm text-gray-600">
                    I agree to the
                    <a href="#" class="text-blue-600 hover:underline">Terms</a>
                    and
                    <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>.
                </label>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition duration-200"
            >
                Create account
            </button>

            <div id="message" class="text-sm text-center hidden"></div>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Already have an account?
            <a href="#" class="text-blue-600 hover:underline">Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const message = document.getElementById('message');

        function showMessage(text, type) {
            message.textContent = text;
            message.classList.remove('hidden', 'text-red-600', 'text-green-600');
            message.classList.add(type === 'error' ? 'text-red-600' : 'text-green-600');
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            if (name.length < 2) {
                showMessage('Name must be at least 2 characters.', 'error');
                return;
            }

            if (!terms) {
                showMessage('Please accept the Terms and Privacy Policy.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            showMessage('Account created successfully! (demo)', 'success');

            form.reset();
        });
    </script>

</body>
</html>
